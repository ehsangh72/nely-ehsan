<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Gateway Service</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        h1 { margin-top: 0; }
        code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .status {
            background: rgba(0,255,0,0.2);
            border-left: 4px solid #00ff00;
            padding: 10px;
            margin: 20px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Edge Gateway Active</h1>
        <div class="status">
            ✅ Service is running
        </div>
        <p>This is an edge-optimized gateway service. All requests are being processed through the edge network.</p>
        <p>Configure your <code>UPSTREAM_ENDPOINT</code> environment variable to enable proxying.</p>
        <hr>
        <small>Edge Gateway v2.0.0</small>
    </div>
</body>
</html>
